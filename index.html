        const PL_MONTHS = {

        const parseDate = (s) => {
            if (!s) return null;
            s = s.trim().replace(/[–—]/g, '-');
            // YYYY-MM-DD
            let m = s.match(/^(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})$/);
            if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
            // DD.MM.YYYY or DD-MM-YYYY
            m = s.match(/^(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{4})$/);
            if (m) return `${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
            // D mon YYYY  or  D mon. YYYY
            m = s.match(/^(\d{1,2})\s+([a-ząćęłńóśźż]+)\.?\s+(\d{4})$/i);
            if (m) {
                const mo = PL_MONTHS[m[2].toLowerCase().replace(/ę/g,'e').replace(/ź/g,'z').replace(/ą/g,'a').replace(/ła/g,'la')];
                const mo2 = PL_MONTHS[m[2].toLowerCase()];
                const month = mo || mo2;
                if (month) return `${m[3]}-${String(month).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;

            return null;

        const parseImportText = (text) => {

            const hasTSV = firstCols.length >= 2;
            let nameIdx = -1, startIdx = -1, endIdx = -1, catIdx = -1, closeIdx = -1;

                firstCols.forEach((h, i) => {
                    const n = h.toLowerCase().trim();

                    const start = parseDate(startRaw);

                    if (!name || !start || !end) continue;
                    const cat = (catRaw && catRaw.trim()) ? catRaw.trim() : 'Inne';

                    tasks.push({ id: Date.now() + tasks.length, name, start, end, category: cat, closure, comment: '' });

                    const cat = 'Inne';
                    const closure = /zamk|clos|tor/i.test(line);
                    tasks.push({ id: Date.now() + tasks.length, name: nameRaw, start, end, category: cat, closure, comment: '' });

                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden">
                        <div className="bg-slate-800 text-white px-6 py-4 flex justify-between items-center">
                            <h3 className="font-semibold text-lg">{task ? 'Edytuj Zadanie' : 'Dodaj Nowe Zadanie'}</h3>
                            <button onClick={onClose} className="text-slate-300 hover:text-white">&times;</button>
                        </div>
                        <form onSubmit={handleSubmit} className="p-6 space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">Nazwa zadania</label>
                                <input required type="text" name="name" value={formData.name} onChange={handleChange} 
                                    className="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 outline-none" 
                                    placeholder="np. Roboty przygotowawcze"/>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">Data startu</label>
                                    <input required type="date" name="start" value={formData.start} onChange={handleChange} 
                                        className="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 outline-none"/>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">Data ko&#324;ca</label>
                                    <input required type="date" name="end" value={formData.end} onChange={handleChange} 
                                        className="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 outline-none"/>
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">Kategoria / Obiekt</label>
                                {!showNewCat ? (
                                    <div className="flex gap-2">
                                        <select name="category" value={formData.category} onChange={handleChange}
                                            className="flex-1 border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 outline-none">
                                            {(categories && categories.length > 0 ? categories : ['Inne']).map(c => (
                                                <option key={c} value={c}>{c}</option>
                                            ))}
                                        </select>
                                        <button type="button" onClick={() => setShowNewCat(true)}
                                            className="px-3 py-2 border border-dashed border-slate-300 text-slate-500 hover:border-brand-400 hover:text-brand-600 rounded-lg text-sm transition-colors whitespace-nowrap">+ Nowa</button>
                                    </div>
                                ) : (
                                    <div className="flex gap-2">
                                        <input type="text" value={newCatInput} onChange={e => setNewCatInput(e.target.value)}
                                            placeholder="Wpisz nazwę kategorii…"
                                            className="flex-1 border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 outline-none text-sm" autoFocus />
                                        <button type="button" onClick={() => { if (newCatInput.trim()) { handleChange({target:{name:'category',value:newCatInput.trim()}}); setShowNewCat(false); } }}
                                            className="px-3 py-2 bg-brand-500 text-white rounded-lg text-sm hover:bg-brand-600 transition-colors">OK</button>
                                        <button type="button" onClick={() => { setShowNewCat(false); setNewCatInput(''); }}
                                            className="px-3 py-2 text-slate-500 hover:bg-slate-100 rounded-lg text-sm transition-colors">×</button>
                                    </div>
                                )}
                            </div>
                            <div className="flex items-center mt-4">
                                <input type="checkbox" id="closure" name="closure" checked={formData.closure} onChange={handleChange} 
                                    className="w-4 h-4 text-red-600 border-slate-300 rounded focus:ring-red-500 cursor-pointer"/>
                                <label htmlFor="closure" className="ml-2 block text-sm font-medium text-slate-700 cursor-pointer">
                                    Stan B aktywny (kolumna Znak)
                                </label>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">Komentarz</label>
                                <textarea name="comment" value={formData.comment || ''} onChange={handleChange} rows={2}
                                    className="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 outline-none resize-none text-sm"
                                    placeholder="Opcjonalny komentarz do zadania…"/>
                            </div>
                            {!task && tasks && tasks.length > 0 && (
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">Wstaw po wierszu</label>
                                    <select value={insertAfterRow} onChange={e => setInsertAfterRow(e.target.value)}
                                        className="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 outline-none text-sm">
                                        <option value={0}>--- na początku listy ---</option>
                                        {tasks.map((t, i) => (
                                            <option key={t.id} value={i + 1}>{i + 1}. {t.name}</option>
                                        ))}
                                    </select>
                                </div>
                            )}
                            <div className="pt-4 flex justify-end gap-3 border-t mt-6">
                                <button type="button" onClick={onClose} className="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">Anuluj</button>
                                <button type="submit" className="px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-lg shadow transition-colors">Zapisz</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [tasks, setTasks] = useState(() => {
                try {
                    const saved = localStorage.getItem('harmo1_tasks');
                    return saved ? JSON.parse(saved) : initialTasks;
                } catch { return initialTasks; }
            });
            const [isModalOpen, setModalOpen] = useState(false);
            const [editingTask, setEditingTask] = useState(null);
            const [isAiPanelOpen, setAiPanelOpen] = useState(false);
            const loadHtmlRef = useRef(null);
            const categories = useMemo(() => [...new Set(tasks.map(t => t.category).filter(Boolean))], [tasks]);
            const getCatColor = useCallback((cat) => {
                const idx = categories.indexOf(cat);
                return idx >= 0 ? CAT_COLORS[idx % CAT_COLORS.length] : '#64748b';
            }, [categories]);
            const [openMenuId, setOpenMenuId] = useState(null);
            useEffect(() => {
                if (openMenuId === null) return;
                const close = () => setOpenMenuId(null);
                document.addEventListener('click', close);
                return () => document.removeEventListener('click', close);
            }, [openMenuId]);
            const [likedGiGantt, setLikedGiGantt] = useState(() => { try { return !!localStorage.getItem('gigantt_liked'); } catch { return false; } });
            const [showDonateMsg, setShowDonateMsg] = useState(false);

            const handleLike = () => {
                if (!likedGiGantt) { setLikedGiGantt(true); try { localStorage.setItem('gigantt_liked', '1'); } catch {} }
                setShowDonateMsg(true);
            };

            const handleAiImport = (newTasks) => {
                pushHistory(tasks);
                setTasks(newTasks);
                setAiPanelOpen(false);
            };

            const handleLoadHtml = (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                e.target.value = '';
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const html = ev.target.result;
                        const m = html.match(/\/\* HARMO1-DATA-START \*\/[\s\S]*?const initialTasks = (\[[\s\S]*?\]);[\s\S]*?\/\* HARMO1-DATA-END \*\//);
                        if (!m) { alert('Nie znaleziono danych harmonogramu w tym pliku HTML.\nUpewnij si\u0119, \u017ce to plik zapisany przez giGantt.'); return; }
                        const loaded = JSON.parse(m[1]);
                        if (!Array.isArray(loaded) || loaded.length === 0) { alert('Plik zawiera pusty harmonogram.'); return; }
                        const normalized = loaded.map((t, i) => ({
                            id: t.id || Date.now() + i,
                            name: t.name || 'Zadanie',
                            start: t.start,
                            end: t.end,
                            category: t.category || 'Brak',
                            closure: !!t.closure,
                            comment: t.comment || ''
                        }));
                        if (!window.confirm(`Wczyta\u0107 ${normalized.length} zada\u0144 z pliku "${file.name}"?\nAktualne dane zostan\u0105 zast\u0105pione (mo\u017cna cofn\u0105\u0107 Cofnij).`)) return;
                        pushHistory(tasks);
                        setTasks(normalized);
                    } catch(err) { alert('B\u0142\u0105d odczytu pliku: ' + err.message); }
                };
                reader.readAsText(file, 'utf-8');
            };

            const [pixelsPerDay, setPixelsPerDay] = useState(2);
            const [rowHeight, setRowHeight] = useState(40); // px, default = h-14 = 56px
            const [syncRows, setSyncRows] = useState(true);
            const [showBarDates, setShowBarDates] = useState(false);
            const [showComments, setShowComments] = useState(false);
            const [projectDesc, setProjectDesc] = useState('Edytuj opis harmonogramu.');
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [leftPanelWidth, setLeftPanelWidth] = useState(460);
            const leftPanelRef = useRef(null);

            const handlePanelResizeMouseDown = (e) => {
                e.preventDefault();
                const startX = e.clientX;
                const startW = leftPanelRef.current ? leftPanelRef.current.offsetWidth : leftPanelWidth;
                const onMove = (ev) => {
                    const newW = Math.max(280, Math.min(900, startW + ev.clientX - startX));
                    setLeftPanelWidth(newW);
                };
                const onUp = () => {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                };
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            };

            const listScrollRef = useRef(null);
            const ganttScrollRef = useRef(null);
            const isSyncingScroll = useRef(false);
            const dragItem = useRef(null);
            const dragOverItem = useRef(null);
            const [dragOverIndex, setDragOverIndex] = useState(null);
            const [history, setHistory] = useState([]);
            const pushHistory = useCallback((snapshot) => { setHistory(h => [...h.slice(-29), snapshot]); }, []);
            const handleUndo = () => {
                setHistory(h => {
                    if (h.length === 0) return h;
                    setTasks(h[h.length - 1]);
                    return h.slice(0, -1);
                });
            };

            const [lasso, setLasso] = useState(null);
            const lassoRef = useRef(null);
            const ganttRowsRef = useRef(null);
            const ganttHScrollRef = useRef(null);

            const [znakEmojis, setZnakEmojis] = useState(['\ud83d\udc77', '🚫']);
            const [znakLabels, setZnakLabels] = useState(['Stan A', 'Stan B']);
            const [znakPickerOpen, setZnakPickerOpen] = useState(false);
            const [znakPickingSlot, setZnakPickingSlot] = useState(0);
            const [znakPickerPos, setZnakPickerPos] = useState({ top: 60, left: 0 });
            const znakHeaderRef = useRef(null);
            const handleZnakHeaderClick = () => {
                if (znakHeaderRef.current) {
                    const r = znakHeaderRef.current.getBoundingClientRect();
                    setZnakPickerPos({ top: r.bottom + 6, left: Math.max(4, r.left - 120) });
                }
                setZnakPickerOpen(v => !v);
            };
            const handleZnakEmojiSelect = (em) => {
                setZnakEmojis(prev => { const n = [...prev]; n[znakPickingSlot] = em; return n; });
            };
            const handleZnakLabelChange = (slot, val) => {
                setZnakLabels(prev => { const n = [...prev]; n[slot] = val; return n; });
            };

            useEffect(() => {
                try { localStorage.setItem('harmo1_tasks', JSON.stringify(tasks)); } catch {}
            }, [tasks]);

            const handleDragStart = (index) => { dragItem.current = index; };
            const handleDragEnter = (index) => { dragOverItem.current = index; setDragOverIndex(index); };
            const handleDragEnd = () => {
                if (dragItem.current === null || dragOverItem.current === null || dragItem.current === dragOverItem.current) {
                    dragItem.current = null; dragOverItem.current = null; setDragOverIndex(null); return;
                }
                const newTasks = [...tasks];
                const [removed] = newTasks.splice(dragItem.current, 1);
                newTasks.splice(dragOverItem.current, 0, removed);
                pushHistory(tasks);
                setTasks(newTasks);
                dragItem.current = null; dragOverItem.current = null; setDragOverIndex(null);
            };

            const handleListScroll = useCallback(() => {
                if (!syncRows || isSyncingScroll.current) return;
                isSyncingScroll.current = true;
                if (ganttScrollRef.current) ganttScrollRef.current.scrollTop = listScrollRef.current.scrollTop;
                isSyncingScroll.current = false;
            }, [syncRows]);

            const handleGanttScroll = useCallback(() => {
                if (isSyncingScroll.current) return;
                isSyncingScroll.current = true;
                if (syncRows && listScrollRef.current) listScrollRef.current.scrollTop = ganttScrollRef.current.scrollTop;
                if (ganttHScrollRef.current) ganttHScrollRef.current.scrollLeft = ganttScrollRef.current.scrollLeft;
                isSyncingScroll.current = false;
            }, [syncRows]);

            const handleHScroll = useCallback(() => {
                if (isSyncingScroll.current) return;
                isSyncingScroll.current = true;
                if (ganttScrollRef.current) ganttScrollRef.current.scrollLeft = ganttHScrollRef.current.scrollLeft;
                isSyncingScroll.current = false;
            }, []);
            const [shiftDays, setShiftDays] = useState(7);
            const [shiftTarget, setShiftTarget] = useState('both');
            const [sliderOffset, setSliderOffset] = useState(0);
            const [editingBarDate, setEditingBarDate] = useState(null); // {id, field:'start'|'end'}
            const [barDragOffset, setBarDragOffset] = useState(0); // days offset during bar drag preview

            const PIXELS_PER_DAY = pixelsPerDay;

            const toggleSelect = (id) => {
                setSelectedIds(prev => {
                    const next = new Set(prev);
                    if (next.has(id)) next.delete(id); else next.add(id);
                    return next;
                });
            };

            const toggleSelectAll = () => {
                if (selectedIds.size === tasks.length) setSelectedIds(new Set());
                else setSelectedIds(new Set(tasks.map(t => t.id)));
            };

            const handleShiftDates = () => {
                const days = parseInt(shiftDays, 10);
                if (isNaN(days) || days === 0) return;
                pushHistory(tasks);
                setTasks(tasks.map(t => {
                    if (!selectedIds.has(t.id)) return t;
                    return {
                        ...t,
                        start: shiftTarget !== 'end'   ? addDays(t.start, days) : t.start,
                        end:   shiftTarget !== 'start' ? addDays(t.end,   days) : t.end,
                    };
                }));
            };

            const selectedDateRange = useMemo(() => {
                if (selectedIds.size === 0) return null;
                const sel = tasks.filter(t => selectedIds.has(t.id));
                if (sel.length === 0) return null;
                const starts = sel.map(t => t.start).sort();
                const ends = sel.map(t => t.end).sort();
                return { minStart: starts[0], maxEnd: ends[ends.length - 1] };
            }, [tasks, selectedIds]);

            const handleSliderCommit = useCallback(() => {
                if (sliderOffset === 0) return;
                pushHistory(tasks);
                setTasks(tasks.map(t => {
                    if (!selectedIds.has(t.id)) return t;
                    return {
                        ...t,
                        start: shiftTarget !== 'end'   ? addDays(t.start, sliderOffset) : t.start,
                        end:   shiftTarget !== 'start' ? addDays(t.end,   sliderOffset) : t.end,
                    };
                }));
                setSliderOffset(0);
            }, [sliderOffset, tasks, selectedIds, shiftTarget]);

            // Calculate overall bounds
            const timeline = useMemo(() => {
                if (tasks.length === 0) return { start: new Date(), end: new Date(), days: 0, months: [] };
                
                let minDate = new Date(tasks[0].start);
                let maxDate = new Date(tasks[0].end);

                tasks.forEach(t => {
                    const s = new Date(t.start);
                    const e = new Date(t.end);
                    if (s < minDate) minDate = s;
                    if (e > maxDate) maxDate = e;
                });

                // Add padding
                minDate.setDate(minDate.getDate() - 15);
                maxDate.setDate(maxDate.getDate() + 30);

                const totalDays = Math.ceil((maxDate - minDate) / (1000 * 60 * 60 * 24));
                
                // Generate month markers
                const months = [];
                let current = new Date(minDate);
                current.setDate(1); // Start at first of the month
                
                while (current <= maxDate) {
                    months.push({
                        label: current.toLocaleDateString('pl-PL', { month: 'short', year: 'numeric' }),
                        offsetDays: Math.ceil((current - minDate) / (1000 * 60 * 60 * 24))
                    });
                    current.setMonth(current.getMonth() + 1);
                }

                return { minDate, maxDate, totalDays, months };
            }, [tasks]);

            // Handlers
            const handleAddTask = () => {
                setEditingTask(null);
                setModalOpen(true);
            };

            const handleEditTask = (task) => {
                setEditingTask(task);
                setModalOpen(true);
            };

            const handleDeleteTask = (id) => {
                if(confirm("Czy na pewno chcesz usunąć to zadanie?")) {
                    pushHistory(tasks);
                    setTasks(tasks.filter(t => t.id !== id));
                }
            };

            const handleDeleteSelected = () => {
                if (selectedIds.size === 0) return;
                if (!confirm(`Czy na pewno usunąć ${selectedIds.size} zaznaczone${selectedIds.size === 1 ? ' zadanie' : selectedIds.size < 5 ? ' zadania' : ' zadań'}?`)) return;
                pushHistory(tasks);
                setTasks(tasks.filter(t => !selectedIds.has(t.id)));
                setSelectedIds(new Set());
            };

            const handleSaveTask = (taskData, insertAfterIndex) => {
                pushHistory(tasks);
                if (taskData.id) {
                    setTasks(tasks.map(t => t.id === taskData.id ? taskData : t));
                } else {
                    const newTask = { ...taskData, id: Date.now() };
                    const newTasks = [...tasks];
                    const pos = (insertAfterIndex == null) ? newTasks.length : Math.min(insertAfterIndex, newTasks.length);
                    newTasks.splice(pos, 0, newTask);
                    setTasks(newTasks);
                }
                setModalOpen(false);
            };

            const handlePrint = (mode) => {
                const ppd = PIXELS_PER_DAY;
                const rh = rowHeight;
                const totalW = timeline.totalDays * ppd;

                const monthsHtml = timeline.months.map(m =>
                    `<div style="position:absolute;top:0;bottom:0;left:${m.offsetDays*ppd}px;border-left:1px solid #cbd5e1;padding-left:4px;padding-top:10px;font-size:10px;font-weight:600;color:#64748b;white-space:nowrap">${m.label}</div>`
                ).join('');

                const gridHtml = timeline.months.map((m,i) =>
                    `<div key="g${i}" style="position:absolute;top:0;bottom:0;left:${m.offsetDays*ppd}px;border-left:1px solid #e2e8f0;pointer-events:none"></div>`
                ).join('');

                const colorMap = (task) => {
                    if (task.closure) return '#ef4444';
                    const cats = [...new Set(tasks.map(t=>t.category).filter(Boolean))];
                    const idx = cats.indexOf(task.category);
                    return idx >= 0 ? CAT_COLORS[idx % CAT_COLORS.length] : '#64748b';
                };

                const barsHtml = tasks.map(task => {
                    const so = Math.ceil((new Date(task.start) - timeline.minDate) / 86400000);
                    const dur = Math.ceil((new Date(task.end) - new Date(task.start)) / 86400000);
                    const bw = Math.max(dur * ppd, 4);
                    const bh = Math.max(rh - 10, 14);
                    const bt = Math.floor((rh - bh) / 2);
                    const bg = colorMap(task);
                    const stripe = task.closure ? `background:repeating-linear-gradient(45deg,rgba(239,68,68,0.85),rgba(239,68,68,0.85) 8px,rgba(220,38,38,1) 8px,rgba(220,38,38,1) 16px);` : `background:${bg};`;
                    return `<div style="height:${rh}px;border-bottom:1px solid #f1f5f9;position:relative">
                        <div style="position:absolute;left:${so*ppd}px;top:${bt}px;width:${bw}px;height:${bh}px;${stripe}border-radius:4px;border:1px solid rgba(0,0,0,0.15)"></div>
                        <div style="position:absolute;left:${so*ppd+bw+4}px;top:${bt}px;height:${bh}px;line-height:${bh}px;font-size:${Math.max(8,Math.min(12,Math.round(rh/5)))}px;color:#334155;font-weight:500;white-space:nowrap">${task.name}</div>
                    </div>`;
                }).join('');

                const tableHtml = mode === 'both' ? `
                <table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:16px">
                    <thead><tr style="background:#f1f5f9">
                        <th style="border:1px solid #e2e8f0;padding:4px 8px;text-align:left">Obiekt</th>
                        <th style="border:1px solid #e2e8f0;padding:4px 8px;text-align:left">Nazwa zadania</th>
                        <th style="border:1px solid #e2e8f0;padding:4px 8px">Start</th>
                        <th style="border:1px solid #e2e8f0;padding:4px 8px">Koniec</th>
                        <th style="border:1px solid #e2e8f0;padding:4px 8px">Tyg.</th>
                        <th style="border:1px solid #e2e8f0;padding:4px 8px">Zam.</th>
                    </tr></thead>
                    <tbody>${tasks.map(t => {
                        const dur = Math.round(Math.ceil((new Date(t.end)-new Date(t.start))/86400000)/7);
                        return `<tr><td style="border:1px solid #e2e8f0;padding:3px 8px">${t.category}</td>
                            <td style="border:1px solid #e2e8f0;padding:3px 8px">${t.name}</td>
                            <td style="border:1px solid #e2e8f0;padding:3px 8px;text-align:center">${t.start}</td>
                            <td style="border:1px solid #e2e8f0;padding:3px 8px;text-align:center">${t.end}</td>
                            <td style="border:1px solid #e2e8f0;padding:3px 8px;text-align:center">${dur}</td>
                            <td style="border:1px solid #e2e8f0;padding:3px 8px;text-align:center">${t.closure ? znakEmojis[1] : znakEmojis[0]}</td>
                        </tr>`;
                    }).join('')}</tbody>
                </table>` : '';

                const legendHtml = (() => {
                    const cats = [...new Set(tasks.map(t=>t.category).filter(Boolean))];
                    const catItems = cats.map((c,i) => `<span style="display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:20px;height:14px;background:${CAT_COLORS[i%CAT_COLORS.length]};border-radius:3px;border:1px solid rgba(0,0,0,0.15)"></span>${c}</span>`).join('');
                    return `<div style="display:flex;flex-wrap:wrap;gap:12px 20px;align-items:center;margin-bottom:10px;padding:6px 10px;border:1px solid #e2e8f0;border-radius:6px;background:#f8fafc;font-size:11px;font-family:sans-serif">
                    <span style="font-weight:700;color:#334155;margin-right:4px">Legenda:</span>
                    ${catItems}
                    <span style="display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:20px;height:14px;background:repeating-linear-gradient(45deg,rgba(239,68,68,0.85),rgba(239,68,68,0.85) 5px,rgba(220,38,38,1) 5px,rgba(220,38,38,1) 10px);border-radius:3px;border:1px solid rgba(0,0,0,0.15)"></span>Zamkni&#281;cie torowe</span>
                    </div>`;
                })();

                const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
                <title>Harmonogram</title>
                <style>body{font-family:sans-serif;margin:8mm}h2{margin:0 0 8px}@media print{@page{size:landscape;margin:8mm}body{margin:0}}</style>
                </head><body>
                <h2>Harmonogram — ${projectDesc}</h2>
                ${legendHtml}
                <div id="pw" style="overflow:visible">
                <div style="width:${totalW}px;position:relative">
                    <div style="height:32px;background:#f1f5f9;border-bottom:1px solid #cbd5e1;position:relative">${monthsHtml}</div>
                    <div style="position:relative">${gridHtml}${barsHtml}</div>
                </div></div>
                <script>window.onload=function(){
                    var pw=document.getElementById('pw');
                    var cw=pw.scrollWidth;
                    var scale=Math.min(1,(window.innerWidth-40)/cw);
                    if(scale<1){document.documentElement.style.zoom=scale;}
                    window.print();
                    window.onafterprint=function(){window.close();};

                </body></html>`;

                const w = window.open('', '_blank', 'width=1200,height=800');
                w.document.write(html);
                w.document.close();
            };
            const handleExportPDF = () => {
                const loadScript = (src) => new Promise((res, rej) => {
                    if (window.jspdf) { res(); return; }
                    const s = document.createElement('script');
                    s.src = src; s.onload = res; s.onerror = rej;
                    document.head.appendChild(s);
                });
                loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js').then(() => {
                    const { jsPDF } = window.jspdf;
                    const pl = s => (s||'').replace(/[^\x00-\x7E]/g, c => ({'ą':'a','ć':'c','ę':'e','ł':'l','ń':'n','ó':'o','ś':'s','ź':'z','ż':'z','Ą':'A','Ć':'C','Ę':'E','Ł':'L','Ń':'N','Ó':'O','Ś':'S','Ź':'Z','Ż':'Z'}[c]||c));
                    const MARGIN = 8, PAGE_W = 297, PAGE_H = 210, TITLE_H = 7, LEGEND_H = 7, TIMELINE_H = 7;
                    const availW = PAGE_W - MARGIN * 2;
                    const availH = PAGE_H - MARGIN * 2 - TITLE_H - LEGEND_H - TIMELINE_H;
                    const rowHmm = Math.max(3, Math.min(8, availH / Math.max(tasks.length, 1)));
                    const dayMm = availW / Math.max(timeline.totalDays, 1);
                    const contentW = availW;
                    const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'landscape' });
                    const hexToRGB = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
                    const cats = [...new Set(tasks.map(t => t.category).filter(Boolean))];
                    const getCatColor = cat => { const i = cats.indexOf(cat); return i >= 0 ? CAT_COLORS[i % CAT_COLORS.length] : '#64748b'; };
                    // Title
                    let y = MARGIN;
                    doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(30,41,59);
                    doc.text('Harmonogram - ' + new Date().toISOString().slice(0,10), MARGIN, y + 4);
                    doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(100,116,139);
                    doc.text(pl(projectDesc), MARGIN, y + 9);
                    y += TITLE_H + 4;
                    // Legend
                    doc.setFontSize(6.5); doc.setFont('helvetica','normal');
                    let lx = MARGIN;
                    cats.forEach((cat, i) => {
                        const [r,g,b] = hexToRGB(CAT_COLORS[i % CAT_COLORS.length]);
                        doc.setFillColor(r,g,b); doc.rect(lx, y+0.5, 4, 3, 'F');
                        doc.setTextColor(51,65,85); doc.text(pl(cat), lx+5, y+3);
                        lx += 5 + doc.getTextWidth(cat) + 3;
                    });
                    doc.setFillColor(220,38,38); doc.rect(lx, y+0.5, 4, 3, 'F');
                    doc.setTextColor(51,65,85); doc.text('Stan B', lx+5, y+3); // no diacritics
                    y += LEGEND_H;
                    // Timeline header
                    doc.setFillColor(241,245,249); doc.rect(MARGIN, y, contentW, TIMELINE_H, 'F');
                    doc.setFontSize(6); doc.setTextColor(100,116,139);
                    timeline.months.forEach(m => {
                        const x = MARGIN + m.offsetDays * dayMm;
                        doc.setDrawColor(203,213,225); doc.setLineWidth(0.1);
                        doc.line(x, y, x, y + TIMELINE_H + tasks.length * rowHmm);
                        doc.text(pl(m.label), x+0.5, y+4.5);
                    });
                    y += TIMELINE_H;
                    // Bars
                    tasks.forEach((task, i) => {
                        const so = Math.ceil((new Date(task.start) - timeline.minDate) / 86400000);
                        const dur = Math.ceil((new Date(task.end) - new Date(task.start)) / 86400000);
                        const bx = MARGIN + so * dayMm;
                        const bw = Math.max(dur * dayMm, 0.5);
                        const by = y + i * rowHmm + rowHmm * 0.1;
                        const bh = rowHmm * 0.8;
                        if (task.closure) {
                            doc.setFillColor(220,38,38); doc.rect(bx, by, bw, bh, 'F');
                            doc.setDrawColor(255,130,130); doc.setLineWidth(0.25);
                            for (let d = -bh; d < bw; d += 1.4) {
                                let x1 = bx+d, y1 = by, x2 = bx+d+bh, y2 = by+bh;
                                if (x1 < bx) { y1 += bx-x1; x1 = bx; }
                                if (x2 > bx+bw) { y2 -= x2-(bx+bw); x2 = bx+bw; }
                                if (x1 >= bx+bw || y1 >= y2) continue;
                                doc.line(x1,y1,x2,y2);
                            }
                        } else {
                            const [r,g,b] = hexToRGB(getCatColor(task.category));
                            doc.setFillColor(r,g,b); doc.rect(bx, by, bw, bh, 'F');
                        }
                        const fs = Math.max(5, Math.min(7, rowHmm * 2));
                        doc.setFontSize(fs); doc.setTextColor(51,65,85); doc.setFont('helvetica','normal');
                        const nameX = bx + bw + 1.2;
                        const nameMaxW = MARGIN + contentW - nameX - 0.5;
                        if (nameMaxW > 3) {
                            let nameStr = pl(task.name);
                            while (nameStr.length > 1 && doc.getTextWidth(nameStr + '...') > nameMaxW) nameStr = nameStr.slice(0,-1);
                            if (nameStr.length < pl(task.name).length) nameStr += '...';
                            doc.text(nameStr, nameX, by+bh*0.72);
                        }
                        doc.setDrawColor(226,232,240); doc.setLineWidth(0.05);
                        doc.line(MARGIN, y+(i+1)*rowHmm, MARGIN+contentW, y+(i+1)*rowHmm);
                    });
                    doc.save(`harmonogram_${new Date().toISOString().slice(0,10)}.pdf`);
                }).catch(() => alert('Nie udało się załadować biblioteki PDF (jsPDF). Sprawdź połączenie z internetem.'));
            };

            const handleSaveFile = () => {
                try {

                    const tasksJson = JSON.stringify(tasks, null, 12)
                        .replace(/^/mg, '            ').trimStart();
                    const updated = src.replace(
                        /\/\* HARMO1-DATA-START \*\/[\s\S]*?\/\* HARMO1-DATA-END \*\//,
                        `/* HARMO1-DATA-START */\n        const initialTasks = ${tasksJson};\n        /* HARMO1-DATA-END */`
                    );
                    if (updated === src) {
                        alert('Nie udaL�o się zlokalizować znacznikAlw danych. SprAlbuj ponownie po odL�wieLLeniu strony.');
                        return;
                    }
                    const blob = new Blob([updated], {type: 'text/html;charset=utf-8'});
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'harmo1.html';
                    a.click();
                    URL.revokeObjectURL(a.href);
                } catch(e) {
                    alert('BL�ąd zapisu: ' + e.message);

            };

            const handleExportText = () => {
                const today = new Date().toISOString().slice(0,10);
                const header = `# Harmonogram giGantt — eksport ${today} (${tasks.length} zada\u0144)\n# Wklej ten tekst do panelu "\u2728 AI Import" aby wczyta\u0107 dane z powrotem.\n# Format: Nazwa\tStart\tKoniec\tKategoria\tZamkni\u0119cie\tKomentarz`;
                const cols = 'Nazwa\tStart\tKoniec\tKategoria\tZamkni\u0119cie\tKomentarz';
                const rows = tasks.map(t =>
                    [t.name, t.start, t.end, t.category, t.closure ? 'tak' : 'nie', t.comment || ''].join('\t')
                );
                const text = [header, cols, ...rows].join('\n');
                try {
                    const blob = new Blob([text], {type: 'text/plain;charset=utf-8'});
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `harmonogram_${today}.txt`;
                    a.click();
                    URL.revokeObjectURL(a.href);
                } catch(e) { alert('B\u0142\u0105d eksportu: ' + e.message); }
            };

            const moveTask = (index, direction) => {
                if ((direction === -1 && index === 0) || (direction === 1 && index === tasks.length - 1)) return;
                pushHistory(tasks);
                const newTasks = [...tasks];
                const temp = newTasks[index];
                newTasks[index] = newTasks[index + direction];
                newTasks[index + direction] = temp;
                setTasks(newTasks);
            };

            const handleGanttMouseDown = (e) => {
                if (e.button !== 0) return;
                if (e.target.closest('[data-bar]')) return;
                e.preventDefault();
                const rowsEl = ganttRowsRef.current;
                const getPos = (ev) => {
                    const r = rowsEl.getBoundingClientRect();
                    return { x: ev.clientX - r.left, y: ev.clientY - r.top };
                };
                const start = getPos(e);
                const initial = { x1: start.x, y1: start.y, x2: start.x, y2: start.y };
                lassoRef.current = initial;
                setLasso(initial);
                const onMove = (ev) => {
                    const p = getPos(ev);
                    const next = { x1: start.x, y1: start.y, x2: p.x, y2: p.y };
                    lassoRef.current = next;
                    setLasso(next);
                };
                const onUp = (ev) => {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                    document.body.style.userSelect = '';
                    const L = lassoRef.current;
                    lassoRef.current = null;
                    setLasso(null);
                    if (!L) return;
                    const selX1 = Math.min(L.x1, L.x2), selX2 = Math.max(L.x1, L.x2);
                    const selY1 = Math.min(L.y1, L.y2), selY2 = Math.max(L.y1, L.y2);
                    if (selX2 - selX1 < 5 && selY2 - selY1 < 5) {
                        if (!ev.shiftKey) setSelectedIds(new Set());
                        return;
                    }
                    const captured_tasks = tasks;
                    const captured_ppd = PIXELS_PER_DAY;
                    const captured_rh = rowHeight;
                    const captured_minDate = timeline.minDate;
                    const newSel = new Set();
                    captured_tasks.forEach((task, i) => {
                        const rowY1 = i * captured_rh, rowY2 = rowY1 + captured_rh;
                        const so = Math.ceil((new Date(task.start) - captured_minDate) / 86400000);
                        const dur = Math.ceil((new Date(task.end) - new Date(task.start)) / 86400000);
                        const bL = so * captured_ppd, bR = bL + Math.max(dur * captured_ppd, 4);
                        if (rowY2 > selY1 && rowY1 < selY2 && bR > selX1 && bL < selX2)
                            newSel.add(task.id);
                    });
                    if (ev.shiftKey) setSelectedIds(prev => new Set([...prev, ...newSel]));
                    else setSelectedIds(newSel);
                };
                document.body.style.userSelect = 'none';
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            };

            const handleBarDragMouseDown = (e, task) => {
                if (e.button !== 0) return;
                e.preventDefault();

                // Ensure this task is selected (if not already, select only it)
                let capturedSelectedIds = selectedIds;
                if (!selectedIds.has(task.id)) {
                    const next = new Set([task.id]);
                    setSelectedIds(next);
                    capturedSelectedIds = next;
                }
                const startX = e.clientX;
                const capturedPPD = PIXELS_PER_DAY;
                const capturedShiftTarget = shiftTarget;
                const snapshotTasks = tasks;
                let currentDays = 0;
                let hasMoved = false;
                const onMove = (ev) => {
                    const dx = ev.clientX - startX;
                    const days = Math.round(dx / capturedPPD);
                    if (Math.abs(dx) > 3) hasMoved = true;
                    if (days !== currentDays) { currentDays = days; setBarDragOffset(days); }
                };
                const onUp = () => {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    setBarDragOffset(0);
                    if (hasMoved && currentDays !== 0) {
                        pushHistory(snapshotTasks);
                        setTasks(prev => prev.map(t =>
                            capturedSelectedIds.has(t.id)
                                ? { ...t,
                                    start: capturedShiftTarget !== 'end'   ? addDays(t.start, currentDays) : t.start,
                                    end:   capturedShiftTarget !== 'start' ? addDays(t.end,   currentDays) : t.end }
                                : t
                        ));
                    } else if (!hasMoved) {
                        // plain click — toggle selection
                        toggleSelect(task.id);
                    }
                };
                document.body.style.cursor = 'grabbing';
                document.body.style.userSelect = 'none';
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            };

            return (

                            </div>

                                    <span className="text-slate-500 text-xs">↔</span>
                                    <button onClick={() => setPixelsPerDay(v => Math.max(1, v - 1))} disabled={pixelsPerDay <= 1}
                                        className="flex items-center justify-center w-5 h-5 rounded bg-slate-700 hover:bg-slate-600 disabled:opacity-30 text-white transition-colors"
                                    ><IconZoomOut /></button>
                                    <input type="range" min="1" max="12" step="1" value={pixelsPerDay}
                                        onChange={e => setPixelsPerDay(Number(e.target.value))}
                                        className="w-20 accent-brand-500 cursor-pointer" title={`${pixelsPerDay} px/dzień`}
                                    />
                                    <button onClick={() => setPixelsPerDay(v => Math.min(12, v + 1))} disabled={pixelsPerDay >= 12}
                                        className="flex items-center justify-center w-5 h-5 rounded bg-slate-700 hover:bg-slate-600 disabled:opacity-30 text-white transition-colors"
                                    ><IconZoomIn /></button>
                                    <span className="text-slate-400 text-xs w-10">{pixelsPerDay}px/d</span>
                                </div>

                                    <span className="text-slate-500 text-xs">↕</span>

                                        className="flex items-center justify-center w-5 h-5 rounded bg-slate-700 hover:bg-slate-600 disabled:opacity-30 text-white transition-colors"

                        <div className="mt-4 flex flex-wrap gap-x-6 gap-y-2 text-sm text-slate-600 shrink-0">
                            {categories.map((cat, i) => (
                                <div key={cat} className="flex items-center gap-2">
                                    <div className="w-4 h-4 rounded" style={{background: CAT_COLORS[i % CAT_COLORS.length]}}></div>
                                    {cat}
                                </div>
                            ))}
                            <div className="flex items-center gap-2"><div className="w-4 h-4 bg-striped-red border border-red-700 rounded"></div> {znakLabels[1] || 'Zamknięcie torowe'}</div>
                            <div className="w-px bg-slate-300 self-stretch mx-1"></div>
                            {znakLabels.map((label, i) => label.trim() ? (
                                <div key={i} className="flex items-center gap-1.5">
                                    <span className="text-base leading-none">{znakEmojis[i]}</span>
                                    <span>{label}</span>
                                </div>
                            ) : null)}
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="bg-slate-900 text-slate-400 text-xs px-6 py-2 shrink-0 flex items-center justify-between gap-4 flex-wrap">
                        <span>Created by <span className="text-slate-300 font-medium">Slim Software</span> in Wrocław, Poland</span>
                        <div className="flex items-center gap-3">
                            {!showDonateMsg ? (
                                <span className="flex items-center gap-2">
                                    Podoba Ci się?
                                    <button onClick={handleLike}
                                        className={`text-lg leading-none transition-transform hover:scale-125 ${likedGiGantt ? 'text-amber-400' : 'text-slate-500 hover:text-amber-300'}`}
                                        title="Lubię to!">👍</button>
                                </span>
                            ) : (
                                <span className="flex items-center gap-2 text-slate-300">
                                    giGantt jest mały i darmowy, ale jak chcesz to
                                    <a href="https://donate.stripe.com/PLACEHOLDER" target="_blank" rel="noreferrer"
                                        className="inline-flex items-center gap-1 px-3 py-1 bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 text-white rounded-full text-xs font-semibold transition-all shadow">
                                        💜 Przekaż donację
                                    </a>
                                </span>
                            )}
                        </div>
                    </footer>

                    <AiPanel isOpen={isAiPanelOpen} onClose={() => setAiPanelOpen(false)} onImport={handleAiImport} tasks={tasks} />
                    <Modal isOpen={isModalOpen} onClose={() => setModalOpen(false)} task={editingTask} onSave={handleSaveTask} tasks={tasks} categories={categories} />
                    {znakPickerOpen && (
                        <ZnakPicker
                            pos={znakPickerPos}
                            emojis={znakEmojis}
                            labels={znakLabels}
                            pickingSlot={znakPickingSlot}
                            onSelectSlot={setZnakPickingSlot}
                            onSelectEmoji={handleZnakEmojiSelect}
                            onLabelChange={handleZnakLabelChange}
                            onClose={() => setZnakPickerOpen(false)}
                        />
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body></html>
